<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <title>Simple Calculator</title>
</head>

<body>
  <div class="container">
    <section class="section-screen">
      <textarea></textarea>
      <span class="calc-brand">Mastermose production inc. &copy;</span>
    </section>
    <section class="section-buttons">
      <div class="row activity">
        <button>Off</button>
        <button>Ac</button>
        <button>Del</button>
      </div>
      <div class="row operators">
        <button>x</button>
        <button>÷</button>
        <button>%</button>
        <button>+</button>
        <button>-</button>
      </div>
      <dlv class="row operators">
        <button> of </button>
        <button>Hist</button>
        <button>H&uparrow;</button>
        <button>(</button>
        <button>)</button>
      </dlv>
      <div class="row nums">
        <button>7</button>
        <button>8</button>
        <button>9</button>
      </div>
      <div class="row nums">
        <button>4</button>
        <button>5</button>
        <button>6</button>
      </div>
      <div class="row nums">
        <button>1</button>
        <button>2</button>
        <button>3</button>
      </div>
      <div class="row nums zero">
        <button>0</button>
      </div>
      <div class="row equals">
        <button>=</button>
      </div>
      <div class="row dot">
        <button>.</button>
      </div>
    </section>
  </div>
  <script type="module" src="main.js"></script>
</body>

</html>
